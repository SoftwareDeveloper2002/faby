<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Faby | Coming Soon</title>
    <meta name="description" content="Faby is under development and coming soon. Built by SoltryxSolutions.">
    <style>
      :root {
        --bg-1: #f1e8cf;
        --bg-2: #dbc79f;
        --ink: #3d3120;
        --ink-soft: #6a5537;
        --line: #c9af7c;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 16px;
        color: var(--ink);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at 82% 8%, #ffffff 0%, transparent 35%), linear-gradient(160deg, var(--bg-1) 0%, var(--bg-2) 100%);
      }

      .card {
        width: min(100%, 680px);
        text-align: center;
        border: 2px solid var(--line);
        border-radius: 18px;
        padding: 28px 20px;
        background: rgba(255, 250, 240, 0.92);
        box-shadow: 0 24px 45px rgba(62, 45, 24, 0.16);
      }

      .logo {
        width: clamp(86px, 16vw, 120px);
        height: auto;
        border-radius: 16px;
        display: block;
        margin: 0 auto 12px;
      }

      h1 {
        margin: 8px 0;
        font-size: clamp(30px, 5vw, 52px);
        line-height: 1.1;
      }

      p {
        margin: 0 auto;
        max-width: 40ch;
        color: var(--ink-soft);
        line-height: 1.6;
      }

      .company {
        margin-top: 18px;
        font-weight: 700;
      }

      .company a {
        color: #6f512d;
      }
    </style>
  </head>
  <body>
    <main class="card" aria-labelledby="title">
      <img class="logo" src="/faby.png" alt="Faby logo">
      <h1 id="title">Coming Soon</h1>
      <p>This website is under development and will launch soon with a better experience.</p>
      <p class="company">Developed by SoltryxSolutions • <a href="https://soltryxsolutions.com" target="_blank" rel="noopener noreferrer">soltryxsolutions.com</a></p>
    </main>
  </body>
</html>
