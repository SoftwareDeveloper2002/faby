<main class="result-page failed" aria-labelledby="failed-title">
  <section class="result-card">
    <p class="eyebrow">Payment Status</p>
    <h1 id="failed-title">Payment Failed or Cancelled</h1>
    <p class="message">
      Your payment did not complete. You can retry your payment or change the payment method.
    </p>

    <div class="actions">
      <a class="btn btn-primary" routerLink="/payment">Try Payment Again</a>
      <a class="btn btn-secondary" routerLink="/booking-confirm">Back to Confirmation</a>
    </div>
  </section>
</main>
