<main class="notfound-page" aria-labelledby="notfound-title">
	<div class="notfound-page__bg" aria-hidden="true">
		<span class="blob blob--one"></span>
		<span class="blob blob--two"></span>
		<span class="grid"></span>
	</div>

	<section class="notfound-card">
		<p class="eyebrow">Error 404</p>
		<h1 id="notfound-title">Page not found</h1>
		<p class="description">
			The page you are looking for moved, expired, or never existed.
			Let's get you back to a working route.
		</p>

		<div class="actions">
			<a class="btn btn--primary" href="/">Go to homepage</a>
			<a class="btn btn--ghost" href="mailto:support@faby.com">Contact support</a>
		</div>

		<p class="hint">If you typed the URL manually, check for typos and try again.</p>
	</section>
</main>
